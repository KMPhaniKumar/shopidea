name: Deploy services (dev)

on:
  push:
    branches: [main]
    paths:
      - 'reelmart/services/**'
  workflow_dispatch:
    inputs:
      service:
        description: "Specific service to deploy (or 'all')"
        required: true
        default: all

permissions:
  id-token: write
  contents: read

jobs:
  detect:
    name: Detect changed services
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.list.outputs.services }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 2 }

      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            catalog:      ['reelmart/services/catalog-service/**']
            order:        ['reelmart/services/order-service/**']
            payment:      ['reelmart/services/payment-service/**']
            delivery:     ['reelmart/services/delivery-service/**']
            notification: ['reelmart/services/notification-service/**']
            whatsapp:     ['reelmart/services/whatsapp-service/**']
            payout:       ['reelmart/services/payout-service/**']
            analytics:    ['reelmart/services/analytics-service/**']
            return:       ['reelmart/services/return-service/**']
            admin:        ['reelmart/services/admin-service/**']

      - id: list
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.service }}" != "all" ]]; then
            echo "services=[\"${{ inputs.service }}\"]" >> $GITHUB_OUTPUT
            exit 0
          fi
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.service }}" == "all" ]]; then
            echo 'services=["catalog","order","payment","delivery","notification","whatsapp","payout","analytics","return","admin"]' >> $GITHUB_OUTPUT
            exit 0
          fi
          # On push: take only services flagged true
          CHANGED=$(jq -nc --argjson f '${{ steps.filter.outputs }}' \
            '[ "catalog","order","payment","delivery","notification","whatsapp","payout","analytics","return","admin"
             ] | map(select($f[.] == "true"))')
          echo "services=$CHANGED" >> $GITHUB_OUTPUT

  deploy:
    needs: detect
    if: needs.detect.outputs.services != '[]' && needs.detect.outputs.services != ''
    strategy:
      matrix:
        service: ${{ fromJson(needs.detect.outputs.services) }}
      fail-fast: false
    uses: ./.github/workflows/_build-push.yml
    with:
      service: ${{ matrix.service }}
      env: dev
