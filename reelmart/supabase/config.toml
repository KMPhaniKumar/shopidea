# Supabase local development config
# Reference: https://supabase.com/docs/guides/cli/config

[api]
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[studio]
port = 54323

[inbucket]
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
file_size_limit = "50MiB"

[auth]
site_url = "http://localhost:3000"
additional_redirect_urls = [
  "https://localhost:3000",
  "exp://localhost:8081",
  "platform://"
]
jwt_expiry = 3600
enable_signup = true
enable_anonymous_sign_ins = false

[auth.sms]
enable_signup = true
# enable_phone_autoconfirm removed from current Supabase CLI schema;
# autoconfirm is now controlled by [auth].enable_confirmations.

[auth.sms.test_otp]
# Test phone numbers with fixed OTPs for local development
# Use these numbers to log in without real SMS
# +919999999999 → OTP: 123456
"+919999999999" = "123456"
"+918888888888" = "123456"
"+917777777777" = "123456"

[auth.sms.twilio]
account_sid = ""
message_service_sid = ""
auth_token = ""

[auth.hook.send_sms]
enabled = true
uri = "https://nysgwdpmpxqmfwelfaxo.functions.supabase.co/send-sms-msg91"
secrets = "env(SMS_HOOK_SECRET)"

[functions.send-sms-msg91]
verify_jwt = false
